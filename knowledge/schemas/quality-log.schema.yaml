# ---------------------------------------------------------------------------
# Notes for /pstack-learn
# ---------------------------------------------------------------------------
#
# Patterns to look for across entries:
#
# 1. Dimensions that consistently score below 3.5 → framework file may need expansion
# 2. revision_triggered: true on most runs → draft quality is structurally low for that skill
# 3. user_feedback notes clustering around a theme → signals a framework or template gap
# 4. frameworks_loaded audits → identify which files are never loaded (can be dropped from INDEX)
# 5. duration_seconds outliers → skills loading too much context (lazy-loading regression)
