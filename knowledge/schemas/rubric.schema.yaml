# rubric.schema.yaml — JSON Schema (YAML format) for pstack rubric files
# Every knowledge/rubrics/<artifact>.yaml must validate against this schema.

$schema: "https://json-schema.org/draft/2020-12"
title: "pstack rubric"
description: "A structured scoring rubric for a pstack artifact type"
type: object
required:
  - artifact_type
  - schema_version
  - dimensions

properties:
  artifact_type:
    type: string
    enum: [vision, strategy, opportunity, prd, design-brief]

  schema_version:
    type: string
    pattern: "^\\d+\\.\\d+$"

  passing_floor:
    type: number
    minimum: 1
    maximum: 5
    default: 3.5
    description: "Weighted average score below which the artifact is considered not ready for next step"

  dimensions:
    type: array
    minItems: 3
    maxItems: 10
    items:
      type: object
      required: [name, weight, prompts, scale]
      properties:
        name:
          type: string
          minLength: 3
        weight:
          type: integer
          minimum: 1
          maximum: 5
          description: "Relative importance (higher = more weight in overall score)"
        prompts:
          type: array
          minItems: 1
          items:
            type: string
          description: "Questions Claude asks itself when scoring this dimension"
        scale:
          type: object
          required: ["1", "3", "5"]
          properties:
            "1":
              type: string
              description: "What a score of 1 looks like (unacceptable)"
            "3":
              type: string
              description: "What a score of 3 looks like (acceptable but weak)"
            "5":
              type: string
              description: "What a score of 5 looks like (excellent)"

additionalProperties: false
