# Shape contract for /vision output
# All fields are checked structurally — not scored for prose quality

artifact_type: vision

required_sections:
  - "Problem"
  - "Target user"
  - "Vision statement"
  - "Why now"
  - "Non-goals"
  - "North Star metric"
  - "Key risks"

min_word_count: 400

must_reference:
  - "jtbd"
  - "north-star"

rubric_floor_score: 3.5

meta_checks:
  - state_after: "VISION_DONE"
  - artifact_entry_present: true
  - rubric_score_recorded: true
